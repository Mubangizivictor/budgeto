name: budgeto
description: "Budgeto - Smart expense tracker & budget manager."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.6
  firebase_storage: ^12.4.5

  # State Management & DI
  flutter_bloc: ^9.1.1
  bloc: ^9.0.0
  provider: ^6.1.5+1
  equatable: ^2.0.7
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Navigation
  go_router: ^15.1.2

  # Local Storage
  shared_preferences: ^2.5.3
  hive_ce: ^2.10.1
  hive_ce_flutter: ^2.2.0

  # UI Components & Styling
  google_fonts: ^8.1.0
  lucide_icons_flutter: ^3.1.14+2
  flutter_svg: ^2.3.0
  dropdown_flutter: ^1.0.3
  smooth_page_indicator: ^2.0.1

  # Animations & Visual Effects
  lottie: ^3.3.3
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  fl_chart: ^0.71.0

  # Utilities
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  uuid: ^4.5.1
  connectivity_plus: ^6.1.4
  url_launcher: ^6.3.1
  permission_handler: ^11.4.0
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  flutter_secure_storage: ^9.0.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^18.0.1

  # Export
  pdf: ^3.11.1
  share_plus: ^10.1.4

  # Native Assets Setup
  flutter_native_splash: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.15
  freezed: ^2.5.8
  freezed_annotation: ^2.4.4
  json_serializable: ^6.9.4
  json_annotation: ^4.9.0
  hive_ce_generator: ^1.8.0
  injectable_generator: ^2.7.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - assets/logos/

flutter_native_splash:
  color: "#6C63FF"
  color_dark: "#121212"
  image: assets/logos/black_icon.jpg
  android: true
  ios: true
  fullscreen: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/logos/black_icon.jpg
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/logos/black_icon.jpg